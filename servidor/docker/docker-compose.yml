
services:
  web-laravel:
    build: .
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ../:/var/www/html
    user: "${UID}:${GID}"
    environment:
      - COMPOSER_ALLOW_SUPERUSER=${COMPOSER_ALLOW_SUPERUSER}
    depends_on:
      - db-laravel

  db-laravel:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_datalar2:/var/lib/mysql

  phpmyadmin-laravel:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: db-laravel
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${PMA_PORT}:80"
    depends_on:
      - db-laravel

volumes:
  db_datalar2:
